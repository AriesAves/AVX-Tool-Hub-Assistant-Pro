<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AVX Tool HUB Assistant PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { display:['Space Grotesk','sans-serif'], body:['DM Sans','sans-serif'] },
                    colors: {
                        avx: {
                            bg:'#0D1117', surface:'#161B22', card:'#1C2333', border:'#30363D',
                            accent:'#F59E0B', 'accent-h':'#D97706', text:'#E6EDF3', muted:'#7D8590',
                            success:'#3FB950', error:'#F85149', info:'#58A6FF',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        *{box-sizing:border-box}
        body{font-family:'DM Sans',sans-serif;background:#0D1117;color:#E6EDF3;margin:0;overflow:hidden;height:100vh}
        h1,h2,h3,h4,h5,h6{font-family:'Space Grotesk',sans-serif}
        ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}
        ::-webkit-scrollbar-thumb{background:#30363D;border-radius:3px}
        .bg-orb{position:absolute;border-radius:50%;filter:blur(100px);opacity:.12;pointer-events:none}
        .bg-orb-1{width:500px;height:500px;background:#F59E0B;top:-150px;left:-100px;animation:om1 25s infinite ease-in-out}
        .bg-orb-2{width:400px;height:400px;background:#EF4444;bottom:-100px;right:-80px;animation:om2 30s infinite ease-in-out}
        .bg-orb-3{width:300px;height:300px;background:#F59E0B;top:50%;left:60%;animation:om3 20s infinite ease-in-out}
        @keyframes om1{0%,100%{transform:translate(0,0)}33%{transform:translate(60px,80px)}66%{transform:translate(-40px,40px)}}
        @keyframes om2{0%,100%{transform:translate(0,0)}33%{transform:translate(-50px,-60px)}66%{transform:translate(30px,-30px)}}
        @keyframes om3{0%,100%{transform:translate(0,0)}50%{transform:translate(-80px,50px)}}
        .page-enter{animation:pgIn .45s ease-out}
        @keyframes pgIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        .msg-enter{animation:msIn .3s ease-out}
        @keyframes msIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        .typing-dot{width:7px;height:7px;border-radius:50%;background:#7D8590;display:inline-block;animation:tb 1.4s infinite ease-in-out}
        .typing-dot:nth-child(2){animation-delay:.2s}.typing-dot:nth-child(3){animation-delay:.4s}
        @keyframes tb{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
        .toast-in{animation:tsIn .35s ease-out}.toast-out{animation:tsOut .3s ease-in forwards}
        @keyframes tsIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
        @keyframes tsOut{to{opacity:0;transform:translateX(40px)}}
        .accent-line{height:2px;background:linear-gradient(90deg,transparent,#F59E0B,transparent)}
        .btn-glow{box-shadow:0 0 20px rgba(245,158,11,.15);transition:box-shadow .3s}
        .btn-glow:hover{box-shadow:0 0 30px rgba(245,158,11,.3)}
        .nav-item{transition:all .2s;border-left:3px solid transparent}
        .nav-item:hover{background:rgba(245,158,11,.06)}
        .nav-item.active{background:rgba(245,158,11,.1);border-left-color:#F59E0B;color:#F59E0B}
        .hover-card{transition:transform .2s,box-shadow .2s}
        .hover-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
        .modal-backdrop{background:rgba(0,0,0,.7);backdrop-filter:blur(4px)}
        .pulse-ring{animation:pr 2s infinite}
        @keyframes pr{0%{box-shadow:0 0 0 0 rgba(245,158,11,.4)}70%{box-shadow:0 0 0 10px rgba(245,158,11,0)}100%{box-shadow:0 0 0 0 rgba(245,158,11,0)}}
        .ch-badge{font-size:.65rem;padding:2px 8px;border-radius:9999px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
        input:focus,select:focus,textarea:focus{outline:none;border-color:#F59E0B!important;box-shadow:0 0 0 2px rgba(245,158,11,.15)}
        .auth-tab{transition:all .2s;border-bottom:2px solid transparent;color:#7D8590}
        .auth-tab.active{color:#F59E0B;border-bottom-color:#F59E0B}
        .status-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
        .status-open{background:#F85149}.status-progress{background:#F59E0B}.status-resolved{background:#3FB950}
        @media(max-width:768px){
            #sup-sidebar{position:fixed;left:-260px;top:0;bottom:0;z-index:40;transition:left .3s}
            #sup-sidebar.open{left:0}#sup-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:35}
            #sup-sidebar.open~#sup-overlay{display:block}
        }
    </style>
</head>
<body>

<!-- Toast Container -->
<div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2" style="max-width:380px"></div>

<!-- ==================== AUTH SCREEN ==================== -->
<div id="auth-screen" class="relative w-full h-full flex items-center justify-center overflow-hidden">
    <div class="bg-orb bg-orb-1"></div><div class="bg-orb bg-orb-2"></div><div class="bg-orb bg-orb-3"></div>
    <div class="relative z-10 w-full max-w-md mx-4 page-enter">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-avx-accent/10 border border-avx-accent/20 mb-4">
                <i class="fa-solid fa-print text-avx-accent text-2xl"></i>
            </div>
            <h1 class="text-3xl font-bold font-display text-avx-text tracking-tight">AVX Tool HUB</h1>
            <p class="text-avx-muted mt-1 text-sm font-medium tracking-wide">Assistant PRO</p>
        </div>
        <div class="bg-avx-surface/80 backdrop-blur-xl border border-avx-border rounded-2xl shadow-2xl overflow-hidden">
            <!-- Tabs -->
            <div class="flex border-b border-avx-border">
                <button onclick="switchAuthTab('login')" id="tab-login" class="auth-tab active flex-1 py-3 text-sm font-medium text-center">Sign In</button>
                <button onclick="switchAuthTab('signup')" id="tab-signup" class="auth-tab flex-1 py-3 text-sm font-medium text-center">Create Account</button>
            </div>
            <div class="accent-line"></div>
            <div class="p-6">
                <!-- Login Form -->
                <div id="form-login" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-avx-muted mb-1.5">Email</label>
                        <input id="li-email" type="email" placeholder="your@email.com" class="w-full bg-avx-card border border-avx-border rounded-lg px-4 py-2.5 text-avx-text placeholder-avx-muted/50 text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-avx-muted mb-1.5">Password</label>
                        <input id="li-pass" type="password" placeholder="Enter password" class="w-full bg-avx-card border border-avx-border rounded-lg px-4 py-2.5 text-avx-text placeholder-avx-muted/50 text-sm" onkeydown="if(event.key==='Enter')handleLogin()">
                    </div>
                    <button onclick="handleLogin()" id="li-btn" class="w-full mt-2 bg-avx-accent hover:bg-avx-accent-h text-avx-bg font-semibold py-2.5 rounded-lg transition-all btn-glow text-sm">
                        <i class="fa-solid fa-arrow-right-to-bracket mr-2"></i>Sign In
                    </button>
                </div>
                <!-- Signup Form -->
                <div id="form-signup" class="space-y-4 hidden">
                    <div>
                        <label class="block text-sm font-medium text-avx-muted mb-1.5">Full Name</label>
                        <input id="su-name" type="text" placeholder="Enter your full name" class="w-full bg-avx-card border border-avx-border rounded-lg px-4 py-2.5 text-avx-text placeholder-avx-muted/50 text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-avx-muted mb-1.5">Email</label>
                        <input id="su-email" type="email" placeholder="your@email.com" class="w-full bg-avx-card border border-avx-border rounded-lg px-4 py-2.5 text-avx-text placeholder-avx-muted/50 text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-avx-muted mb-1.5">Password <span class="text-avx-muted/40">(min 6 characters)</span></label>
                        <input id="su-pass" type="password" placeholder="Create a password" class="w-full bg-avx-card border border-avx-border rounded-lg px-4 py-2.5 text-avx-text placeholder-avx-muted/50 text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-avx-muted mb-1.5">Role</label>
                        <div class="relative">
                            <select id="su-role" class="w-full bg-avx-card border border-avx-border rounded-lg px-4 py-2.5 text-avx-text appearance-none cursor-pointer text-sm">
                                <option value="consultant">Consultant</option>
                                <option value="tech">Tech</option>
                                <option value="supervisor">Supervisor</option>
                            </select>
                            <i class="fa-solid fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-avx-muted text-xs pointer-events-none"></i>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-avx-muted mb-1.5">Designation <span class="text-avx-muted/40">(optional)</span></label>
                        <input id="su-designation" type="text" placeholder="e.g. Senior Consultant" class="w-full bg-avx-card border border-avx-border rounded-lg px-4 py-2.5 text-avx-text placeholder-avx-muted/50 text-sm">
                    </div>
                    <button onclick="handleSignup()" id="su-btn" class="w-full mt-2 bg-avx-accent hover:bg-avx-accent-h text-avx-bg font-semibold py-2.5 rounded-lg transition-all btn-glow text-sm">
                        <i class="fa-solid fa-user-plus mr-2"></i>Create Account
                    </button>
                </div>
            </div>
        </div>
        <p class="text-center text-avx-muted/40 text-xs mt-6">AVX Print Solutions — Internal Tool</p>
    </div>
</div>

<!-- ==================== CONSULTANT / TECH SCREEN ==================== -->
<div id="ct-screen" class="hidden w-full h-full flex flex-col">
    <header class="flex items-center justify-between px-4 md:px-6 py-3 bg-avx-surface border-b border-avx-border shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-avx-accent/10 flex items-center justify-center"><i class="fa-solid fa-print text-avx-accent text-sm"></i></div>
            <div><h2 class="text-sm font-display font-semibold text-avx-text leading-tight">AVX Tool HUB</h2><p id="ct-role-label" class="text-xs text-avx-muted"></p></div>
        </div>
        <div class="flex items-center gap-4">
            <div class="text-right hidden sm:block"><p id="ct-welcome" class="text-sm font-medium text-avx-text"></p><p id="ct-datetime" class="text-xs text-avx-muted"></p></div>
            <div class="w-px h-8 bg-avx-border hidden sm:block"></div>
            <button onclick="handleLogout()" class="flex items-center gap-2 px-3 py-1.5 rounded-lg text-sm text-avx-muted hover:text-avx-error hover:bg-avx-error/10 transition-all"><i class="fa-solid fa-right-from-bracket"></i><span class="hidden sm:inline">Log out</span></button>
        </div>
    </header>
    <div class="flex flex-wrap items-center gap-3 px-4 md:px-6 py-3 bg-avx-bg border-b border-avx-border shrink-0">
        <div class="flex items-center gap-2"><label class="text-xs font-medium text-avx-muted whitespace-nowrap">Order #</label><input id="ct-order" type="text" placeholder="Job number" class="bg-avx-card border border-avx-border rounded-lg px-3 py-1.5 text-avx-text text-sm w-36 placeholder-avx-muted/40"></div>
        <div class="flex items-center gap-2"><label class="text-xs font-medium text-avx-muted whitespace-nowrap">Product Site</label><div class="relative"><select id="ct-site" class="bg-avx-card border border-avx-border rounded-lg px-3 py-1.5 text-avx-text text-sm appearance-none cursor-pointer pr-8"><option value="">Select site</option><option>AVX Prints Main</option><option>AVX Commercial</option><option>AVX Large Format</option><option>AVX Photo</option><option>AVX Labels & Packaging</option><option>AVX Merchandise</option></select><i class="fa-solid fa-chevron-down absolute right-2.5 top-1/2 -translate-y-1/2 text-avx-muted text-[10px] pointer-events-none"></i></div></div>
        <div class="flex items-center gap-2"><label class="text-xs font-medium text-avx-muted whitespace-nowrap">Designation</label><div class="relative"><select id="ct-designation" class="bg-avx-card border border-avx-border rounded-lg px-3 py-1.5 text-avx-text text-sm appearance-none cursor-pointer pr-8"><option value="">Select</option><option>Senior Consultant</option><option>Consultant</option><option>Junior Consultant</option><option>Senior Tech</option><option>Tech</option><option>Junior Tech</option></select><i class="fa-solid fa-chevron-down absolute right-2.5 top-1/2 -translate-y-1/2 text-avx-muted text-[10px] pointer-events-none"></i></div></div>
        <div class="flex items-center gap-1.5"><label class="text-xs font-medium text-avx-muted whitespace-nowrap mr-1">Channel</label>
            <button onclick="setChannel('email')" data-ch="email" class="ch-btn px-3 py-1.5 rounded-lg text-xs font-medium border border-avx-border text-avx-muted hover:border-avx-accent/40 hover:text-avx-accent transition-all"><i class="fa-solid fa-envelope mr-1"></i>Email</button>
            <button onclick="setChannel('voice')" data-ch="voice" class="ch-btn px-3 py-1.5 rounded-lg text-xs font-medium border border-avx-border text-avx-muted hover:border-avx-accent/40 hover:text-avx-accent transition-all"><i class="fa-solid fa-phone mr-1"></i>Voice</button>
            <button onclick="setChannel('chat')" data-ch="chat" class="ch-btn px-3 py-1.5 rounded-lg text-xs font-medium border border-avx-border text-avx-muted hover:border-avx-accent/40 hover:text-avx-accent transition-all"><i class="fa-solid fa-comment mr-1"></i>Chat</button>
        </div>
    </div>
    <div class="flex-1 flex flex-col min-h-0">
        <div id="messages" class="flex-1 overflow-y-auto px-4 md:px-6 py-4 space-y-3"></div>
        <div class="px-4 md:px-6 pb-3 shrink-0">
            <div class="flex items-end gap-2 bg-avx-surface border border-avx-border rounded-xl p-2">
                <textarea id="chat-input" rows="1" placeholder="Type your message..." class="flex-1 bg-transparent text-avx-text text-sm placeholder-avx-muted/40 resize-none border-none px-2 py-1.5 max-h-32" onkeydown="handleChatKey(event)" oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,128)+'px'"></textarea>
                <button onclick="sendMessage()" class="shrink-0 w-9 h-9 rounded-lg bg-avx-accent hover:bg-avx-accent-h text-avx-bg flex items-center justify-center transition-all"><i class="fa-solid fa-paper-plane text-sm"></i></button>
            </div>
        </div>
    </div>
    <div class="flex items-center gap-3 px-4 md:px-6 py-3 bg-avx-surface border-t border-avx-border shrink-0">
        <button onclick="saveSession()" class="flex items-center gap-2 px-5 py-2 bg-avx-accent hover:bg-avx-accent-h text-avx-bg font-semibold rounded-lg text-sm transition-all btn-glow"><i class="fa-solid fa-floppy-disk"></i>Assisted</button>
        <button onclick="openIncidentModal()" class="flex items-center gap-2 px-4 py-2 border border-avx-border text-avx-muted hover:text-avx-error hover:border-avx-error/40 rounded-lg text-sm transition-all"><i class="fa-solid fa-triangle-exclamation"></i>Report Incident</button>
        <button onclick="clearChat()" class="flex items-center gap-2 px-4 py-2 border border-avx-border text-avx-muted hover:text-avx-text hover:border-avx-text/30 rounded-lg text-sm transition-all ml-auto"><i class="fa-solid fa-rotate-right"></i>New Session</button>
    </div>
</div>

<!-- ==================== SUPERVISOR SCREEN ==================== -->
<div id="sup-screen" class="hidden w-full h-full flex flex-col">
    <header class="flex items-center justify-between px-4 md:px-6 py-3 bg-avx-surface border-b border-avx-border shrink-0">
        <div class="flex items-center gap-3">
            <button onclick="toggleSupSidebar()" class="md:hidden w-8 h-8 rounded-lg bg-avx-card flex items-center justify-center text-avx-muted"><i class="fa-solid fa-bars text-sm"></i></button>
            <div class="w-8 h-8 rounded-lg bg-avx-accent/10 flex items-center justify-center"><i class="fa-solid fa-print text-avx-accent text-sm"></i></div>
            <div><h2 class="text-sm font-display font-semibold text-avx-text leading-tight">AVX Tool HUB</h2><p class="text-xs text-avx-muted">Supervisor Dashboard</p></div>
        </div>
        <div class="flex items-center gap-4">
            <div class="text-right hidden sm:block"><p id="sup-welcome" class="text-sm font-medium text-avx-text"></p><p id="sup-datetime" class="text-xs text-avx-muted"></p></div>
            <div class="w-px h-8 bg-avx-border hidden sm:block"></div>
            <button onclick="handleLogout()" class="flex items-center gap-2 px-3 py-1.5 rounded-lg text-sm text-avx-muted hover:text-avx-error hover:bg-avx-error/10 transition-all"><i class="fa-solid fa-right-from-bracket"></i><span class="hidden sm:inline">Log out</span></button>
        </div>
    </header>
    <div class="flex flex-1 min-h-0">
        <aside id="sup-sidebar" class="w-60 bg-avx-surface border-r border-avx-border shrink-0 flex flex-col py-4">
            <nav class="flex-1 space-y-1 px-2">
                <button onclick="switchSupView('home')" data-view="home" class="nav-item active w-full text-left px-4 py-2.5 rounded-r-lg text-sm flex items-center gap-3 text-avx-muted"><i class="fa-solid fa-house w-4 text-center"></i>Home</button>
                <button onclick="switchSupView('tracker')" data-view="tracker" class="nav-item w-full text-left px-4 py-2.5 rounded-r-lg text-sm flex items-center gap-3 text-avx-muted"><i class="fa-solid fa-users w-4 text-center"></i>Staff Tracker</button>
                <button onclick="switchSupView('jobs')" data-view="jobs" class="nav-item w-full text-left px-4 py-2.5 rounded-r-lg text-sm flex items-center gap-3 text-avx-muted"><i class="fa-solid fa-hashtag w-4 text-center"></i>Job Tracker</button>
                <button onclick="switchSupView('incidents')" data-view="incidents" class="nav-item w-full text-left px-4 py-2.5 rounded-r-lg text-sm flex items-center gap-3 text-avx-muted"><i class="fa-solid fa-triangle-exclamation w-4 text-center"></i>Incidents</button>
            </nav>
            <div class="px-4 pt-4 border-t border-avx-border mt-2">
                <div class="bg-avx-card rounded-xl p-3">
                    <div class="flex items-center gap-2 mb-2"><div class="status-dot bg-avx-success pulse-ring"></div><span class="text-xs font-medium text-avx-muted">System Online</span></div>
                    <p id="sup-active-count" class="text-xs text-avx-muted/60">Loading...</p>
                </div>
            </div>
        </aside>
        <div id="sup-overlay" onclick="toggleSupSidebar()"></div>
        <main id="sup-content" class="flex-1 overflow-y-auto p-4 md:p-6 bg-avx-bg"></main>
    </div>
</div>

<!-- ==================== CONVERSATION MODAL ==================== -->
<div id="conv-modal" class="hidden fixed inset-0 z-50 modal-backdrop flex items-center justify-center p-4">
    <div class="bg-avx-surface border border-avx-border rounded-2xl w-full max-w-2xl max-h-[85vh] flex flex-col page-enter shadow-2xl">
        <div class="flex items-center justify-between px-5 py-4 border-b border-avx-border shrink-0">
            <div><h3 class="font-display font-semibold text-avx-text">Conversation Log</h3><p id="conv-meta" class="text-xs text-avx-muted mt-0.5"></p></div>
            <div class="flex items-center gap-2">
                <span id="conv-live" class="hidden text-xs text-avx-success font-medium"><i class="fa-solid fa-circle text-[6px] mr-1"></i>Live</span>
                <button onclick="closeConvModal()" class="w-8 h-8 rounded-lg hover:bg-avx-card flex items-center justify-center text-avx-muted hover:text-avx-text transition-all"><i class="fa-solid fa-xmark"></i></button>
            </div>
        </div>
        <div id="conv-messages" class="flex-1 overflow-y-auto p-5 space-y-3"></div>
        <div id="conv-notes" class="hidden px-5 py-3 border-t border-avx-border bg-avx-card/50"><p class="text-xs font-medium text-avx-muted mb-1">Notes</p><p id="conv-notes-text" class="text-sm text-avx-text"></p></div>
    </div>
</div>

<!-- ==================== INCIDENT MODAL ==================== -->
<div id="incident-modal" class="hidden fixed inset-0 z-50 modal-backdrop flex items-center justify-center p-4">
    <div class="bg-avx-surface border border-avx-border rounded-2xl w-full max-w-md page-enter shadow-2xl">
        <div class="flex items-center justify-between px-5 py-4 border-b border-avx-border"><h3 class="font-display font-semibold text-avx-text">Report Incident</h3><button onclick="closeIncidentModal()" class="w-8 h-8 rounded-lg hover:bg-avx-card flex items-center justify-center text-avx-muted hover:text-avx-text transition-all"><i class="fa-solid fa-xmark"></i></button></div>
        <div class="p-5 space-y-4">
            <div><label class="block text-xs font-medium text-avx-muted mb-1.5">Category</label><div class="relative"><select id="inc-category" class="w-full bg-avx-card border border-avx-border rounded-lg px-3 py-2 text-avx-text text-sm appearance-none cursor-pointer"><option value="complaint">Complaint</option><option value="reprint">Reprint</option><option value="escalation">Escalation</option><option value="quality">Quality Issue</option><option value="delay">Delay</option><option value="other">Other</option></select><i class="fa-solid fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-avx-muted text-xs pointer-events-none"></i></div></div>
            <div><label class="block text-xs font-medium text-avx-muted mb-1.5">Description</label><textarea id="inc-desc" rows="4" placeholder="Describe the incident..." class="w-full bg-avx-card border border-avx-border rounded-lg px-3 py-2 text-avx-text text-sm placeholder-avx-muted/40 resize-none"></textarea></div>
            <button onclick="submitIncident()" class="w-full bg-avx-error hover:bg-red-600 text-white font-semibold py-2.5 rounded-lg text-sm transition-all"><i class="fa-solid fa-paper-plane mr-2"></i>Submit Incident</button>
        </div>

async function handleSignup() {
    const name = document.getElementById('su-name').value.trim();
    const email = document.getElementById('su-email').value.trim();
    const pass = document.getElementById('su-pass').value;
    const role = document.getElementById('su-role').value;
    const designation = document.getElementById('su-designation').value.trim();

    if (!name) return showToast('Please enter your name', 'warning');
    if (!email) return showToast('Please enter your email', 'warning');
    if (pass.length < 6) return showToast('Password must be at least 6 characters', 'warning');

    const btn = document.getElementById('su-btn');
    btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>Creating...';

    try {
        const { data, error } = await db.auth.signUp({
            email, password: pass,
            options: { data: { name, role, designation } }
        });
        if (error) throw error;
        showToast('Account created! You can now sign in.', 'success');
        switchAuthTab('login');
        document.getElementById('li-email').value = email;
    } catch(e) {
        showToast(e.message || 'Signup failed', 'error');
    } finally {
        btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-user-plus mr-2"></i>Create Account';

}

    const btn = document.getElementById('li-btn');

        btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-arrow-right-to-bracket mr-2"></i>Sign In';

}

async function createNewSession() {
    S.renderedMsgIds.clear();
    cleanupMsgChannel();
    const container = document.getElementById('messages');
    container.innerHTML = '';

    try {
        const { data, error } = await db.from('sessions').insert({
            user_id: S.profile.id,
            user_name: S.profile.name,
            user_role: S.profile.role,
        }).select('id').single();
        if (error) throw error;
        S.currentSessionId = data.id;
        subscribeToMessages(data.id);
    } catch(e) {
        console.error('Session create error:', e);
        showToast('Could not start session: ' + e.message, 'error');
        S.currentSessionId = null;
    }

    const welcome = { role:'bot', message:"Hi there, I'm your Print Assistant. Please let me know how can I help you today.<br><br>• I can help you assist your customer<br>• I can assist about our printing standards<br>• I can assist you in locating the product<br>• I provide production guidelines<br>• I can locate specific topics in our knowledge base<br><br>Just tell me!", time: now() };
    renderMsg(welcome);
}

async function saveSession() {
    if (!S.currentSessionId) return showToast('No active session', 'warning');
    const userMsgs = [...S.renderedMsgIds].length;
    if (userMsgs <= 0) return showToast('No conversation to save', 'warning');

    try {
        const { error } = await db.rpc('save_session', { p_session_id: S.currentSessionId, p_notes: null });
        if (error) throw error;
        // Also update order_number, channel, product_site
        const updates = {};
        const on = document.getElementById('ct-order').value.trim();
        const ch = S.channel;
        const ps = document.getElementById('ct-site').value;
        const ds = document.getElementById('ct-designation').value;
        if (on) updates.order_number = on;
        if (ch) updates.channel = ch;
        if (ps) updates.product_site = ps;
        if (Object.keys(updates).length > 0) {
            await db.from('sessions').update(updates).eq('id', S.currentSessionId);
        }
        try { await db.rpc('log_activity', { p_action: 'session_saved', p_details: { session_id: S.currentSessionId } }); } catch(e) {}
        showToast('Conversation saved successfully', 'success');
        document.getElementById('ct-order').value = '';
        await createNewSession();
    } catch(e) {
        showToast('Save failed: ' + e.message, 'error');
    }
}

function subscribeToMessages(sessionId) {
    cleanupMsgChannel();
    msgChannel = db.channel(`msg-${sessionId}`)
        .on('postgres_changes', {
            event: 'INSERT', schema: 'public', table: 'messages',
            filter: `session_id=eq.${sessionId}`
        }, (payload) => {
            const msg = payload.new;
            if (!S.renderedMsgIds.has(msg.id)) {
                S.renderedMsgIds.add(msg.id);
                renderMsg({ role: msg.sender_role, message: msg.content, time: msg.created_at, id: msg.id });
            }
        })
        .subscribe();
}

    if (msgChannel) { db.removeChannel(msgChannel); msgChannel = null; }
}

function botReply(text) {
    const lower = text.toLowerCase();
    let best = null, bestScore = 0;
    for (const entry of KB) {
        let score = 0;
        for (const kw of entry.kw) { if (lower.includes(kw)) score++; }
        if (score > bestScore) { bestScore = score; best = entry; }
    }
    if (best && bestScore > 0) return best.r[Math.floor(Math.random()*best.r.length)];
    const fb = ["I'm not sure I have specific info on that. Could you provide more details? I can help with printing standards, product locations, production guidelines, or customer queries.",
                "That's a good question. Try asking about printing standards, file preparation, product info, or order inquiries.",
                "I don't have a specific answer for that. Try asking about printing standards, product locations, production guidelines, or customer assistance."];
    return fb[Math.floor(Math.random()*fb.length)];
}

    } else {
        d.innerHTML = `<div class="max-w-[80%] md:max-w-[70%]"><div class="flex items-start gap-2.5"><div class="w-7 h-7 rounded-lg bg-avx-accent/10 flex items-center justify-center shrink-0 mt-0.5"><i class="fa-solid fa-print text-avx-accent text-[10px]"></i></div><div class="bg-avx-card border border-avx-border rounded-2xl rounded-bl-md px-4 py-2.5"><p class="text-sm text-avx-text leading-relaxed">${msg.message}</p></div></div><p class="text-[10px] text-avx-muted/50 mt-1 ml-9">${t}</p></div>`;

async function sendMessage() {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text || !S.currentSessionId) return;
    input.value = ''; input.style.height = 'auto';

    // Insert user message into DB (real-time will deliver it back)
    try {
        const { data, error } = await db.from('messages').insert({
            session_id: S.currentSessionId,
            user_id: S.profile.id,
            sender_role: 'user',
            content: text
        }).select('id').single();
        if (error) throw error;
        S.renderedMsgIds.add(data.id);
        renderMsg({ role:'user', message:text, time:now(), id:data.id });
    } catch(e) {
        showToast('Failed to send: ' + e.message, 'error');
        return;
    }

    // Update session metadata
    const updates = {};
    const on = document.getElementById('ct-order').value.trim();
    const ch = S.channel;
    const ps = document.getElementById('ct-site').value;
    if (on) updates.order_number = on;
    if (ch) updates.channel = ch;
    if (ps) updates.product_site = ps;
    if (Object.keys(updates).length > 0) {
        db.from('sessions').update(updates).eq('id', S.currentSessionId).then(() => {});
    }

    // Generate bot response
    showTyping();
    const delay = 600 + Math.random() * 1000;
    setTimeout(async () => {
        hideTyping();
        const reply = botReply(text);
        try {
            const { data, error } = await db.from('messages').insert({
                session_id: S.currentSessionId,
                user_id: S.profile.id,
                sender_role: 'bot',
                content: reply
            }).select('id').single();
            if (error) throw error;
            S.renderedMsgIds.add(data.id);
            renderMsg({ role:'bot', message:reply, time:now(), id:data.id });
        } catch(e) {
            // Fallback: show locally if DB insert fails
            renderMsg({ role:'bot', message:reply, time:now() });
        }
    }, delay);
}

function setChannel(ch) {
    S.channel = ch;
    document.querySelectorAll('.ch-btn').forEach(b => {
        const active = b.getAttribute('data-ch') === ch;
        b.classList.toggle('bg-avx-accent/15', active);

}

    const status = document.getElementById('inc-filter').value;
    const r = document.getElementById('inc-results');
    r.innerHTML = `<div class="flex items-center gap-2 text-avx-muted text-sm py-8 justify-center"><i class="fa-solid fa-spinner fa-spin"></i>Loading...</div>`;
    try {
        let q = db.from('incidents').select('*').order('created_at',{ascending:false}).limit(100);
        if (status) q = q.eq('status', status);
        const { data: incidents, error } = await q;
        if (error) throw error;
        if (!incidents||!incidents.length) { r.innerHTML = `<div class="text-center py-10"><i class="fa-solid fa-inbox text-3xl text-avx-muted/30 mb-3"></i><p class="text-avx-muted text-sm">No incidents found</p></div>`; return; }
        r.innerHTML = `<div class="space-y-3">${incidents.map(inc => `
            <div class="bg-avx-surface border border-avx-border rounded-xl p-4 hover-card">
                <div class="flex items-start gap-3">
                    <div class="w-10 h-10 rounded-xl bg-avx-error/10 flex items-center justify-center shrink-0"><i class="fa-solid fa-triangle-exclamation text-avx-error text-sm"></i></div>
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2 flex-wrap mb-1">
                            ${statusBadge(inc.status)}
                            <span class="ch-badge bg-avx-card text-avx-muted">${esc(inc.category)}</span>
                            ${inc.order_number?`<span class="text-xs text-avx-text font-medium">#${esc(inc.order_number)}</span>`:''}
                        </div>
                        <p class="text-sm text-avx-text mb-1">${esc(inc.description)}</p>
                        <p class="text-xs text-avx-muted">Reported by <strong>${esc(inc.reported_by)}</strong> — ${fmtDT(inc.created_at)}</p>
                    </div>
                    <div class="flex flex-col gap-1.5 shrink-0">
                        ${inc.status!=='resolved'?`<button onclick="changeIncidentStatus('${inc.id}','${inc.status==='open'?'in_progress':'resolved'}')" class="px-3 py-1.5 text-xs border border-avx-border text-avx-muted hover:text-avx-accent hover:border-avx-accent/40 rounded-lg transition-all">${inc.status==='open'?'Start Progress':'Resolve'}</button>`:''}
                        ${inc.session_id?`<button onclick="viewConversation('${inc.session_id}')" class="px-3 py-1.5 text-xs border border-avx-border text-avx-muted hover:text-avx-info hover:border-avx-info/40 rounded-lg transition-all">View Chat</button>`:''}
                    </div>
                </div>
            </div>`).join('')}</div>`;
    } catch(e) { r.innerHTML = `<p class="text-avx-error text-sm text-center py-8">${e.message}</p>`; }
}

async function changeIncidentStatus(id, newStatus) {
    try {
        const { error } = await db.rpc('update_incident_status', { p_incident_id: id, p_status: newStatus });
        if (error) throw error;
        try { await db.rpc('log_activity', { p_action: 'incident_updated', p_details: { incident_id: id, new_status: newStatus } }); } catch(e) {}
        showToast(`Incident marked as ${newStatus.replace('_',' ')}`, 'success');
        filterIncidents();
    } catch(e) { showToast('Failed: ' + e.message, 'error'); }
}

// ==============================================
// 15. CONVERSATION VIEWER (REAL-TIME)
// ==============================================
async function viewConversation(sessionId) {
    const modal = document.getElementById('conv-modal');
    const meta = document.getElementById('conv-meta');
    const msgEl = document.getElementById('conv-messages');
    const notesEl = document.getElementById('conv-notes');
    const notesTxt = document.getElementById('conv-notes-text');

    modal.classList.remove('hidden');
    meta.textContent = 'Loading...';
    msgEl.innerHTML = '<div class="flex items-center gap-2 text-avx-muted text-sm py-8 justify-center"><i class="fa-solid fa-spinner fa-spin"></i></div>';
    notesEl.classList.add('hidden');

    try {
        // First try loading from messages table (real-time capable)
        const { data: messages, error: mErr } = await db.from('messages').select('*').eq('session_id', sessionId).order('created_at',{ascending:true});
        if (mErr) throw mErr;

        const { data: session, error: sErr } = await db.from('sessions').select('*').eq('id', sessionId).single();
        if (sErr) throw sErr;

        if (!session) { meta.textContent = 'Session not found'; msgEl.innerHTML=''; return; }

        meta.innerHTML = `${esc(session.user_name)} (${cap(session.user_role)}) — ${fmtDT(session.started_at)}${session.order_number?' — <strong>#'+esc(session.order_number)+'</strong>':''} ${!session.ended_at?'<span class="text-avx-accent font-medium">LIVE</span>':''}`;

        S.convRenderedIds.clear();

        if (messages && messages.length > 0) {
            msgEl.innerHTML = messages.map(m => {
                S.convRenderedIds.add(m.id);
                if (m.sender_role==='user') {
                    return `<div class="flex justify-end"><div class="max-w-[75%] bg-avx-accent/15 border border-avx-accent/20 rounded-2xl rounded-br-md px-4 py-2.5"><p class="text-sm text-avx-text leading-relaxed">${esc(m.content)}</p><p class="text-[10px] text-avx-muted/50 text-right mt-1">${fmtT(m.created_at)}</p></div></div>`;
                } else {
                    return `<div class="flex justify-start"><div class="max-w-[80%] flex items-start gap-2.5"><div class="w-7 h-7 rounded-lg bg-avx-accent/10 flex items-center justify-center shrink-0 mt-0.5"><i class="fa-solid fa-print text-avx-accent text-[10px]"></i></div><div class="bg-avx-card border border-avx-border rounded-2xl rounded-bl-md px-4 py-2.5"><p class="text-sm text-avx-text leading-relaxed">${m.content}</p><p class="text-[10px] text-avx-muted/50 mt-1">${fmtT(m.created_at)}</p></div></div></div>`;
                }
            }).join('');
        } else if (session.conversation_log && session.conversation_log.length > 0) {
            // Fallback to conversation_log JSONB
            msgEl.innerHTML = session.conversation_log.map(m => {
                if (m.role==='user') {
                    return `<div class="flex justify-end"><div class="max-w-[75%] bg-avx-accent/15 border border-avx-accent/20 rounded-2xl rounded-br-md px-4 py-2.5"><p class="text-sm text-avx-text leading-relaxed">${esc(m.message)}</p><p class="text-[10px] text-avx-muted/50 text-right mt-1">${m.time?fmtT(m.time):''}</p></div></div>`;
                } else {
                    return `<div class="flex justify-start"><div class="max-w-[80%] flex items-start gap-2.5"><div class="w-7 h-7 rounded-lg bg-avx-accent/10 flex items-center justify-center shrink-0 mt-0.5"><i class="fa-solid fa-print text-avx-accent text-[10px]"></i></div><div class="bg-avx-card border border-avx-border rounded-2xl rounded-bl-md px-4 py-2.5"><p class="text-sm text-avx-text leading-relaxed">${m.message}</p><p class="text-[10px] text-avx-muted/50 mt-1">${m.time?fmtT(m.time):''}</p></div></div></div>`;
                }
            }).join('');
        } else {
            msgEl.innerHTML = '<p class="text-avx-muted text-sm text-center py-8">No messages yet</p>';
        }

        if (session.notes) { notesTxt.textContent = session.notes; notesEl.classList.remove('hidden'); }

        // Subscribe to real-time messages if session is still active
        if (!session.ended_at) {
            subscribeConvMessages(sessionId);
        } else {
            cleanupConvChannel();
        }

        msgEl.scrollTop = msgEl.scrollHeight;
    } catch(e) {
        meta.textContent = 'Error';
        msgEl.innerHTML = `<p class="text-avx-error text-sm text-center py-8">${e.message}</p>`;
    }
}

function appendConvMsg(msg) {
    const msgEl = document.getElementById('conv-messages');
    const d = document.createElement('div');
    d.className = 'msg-enter ' + (msg.sender_role==='user' ? 'flex justify-end' : 'flex justify-start');
    if (msg.sender_role==='user') {
        d.innerHTML = `<div class="max-w-[75%] bg-avx-accent/15 border border-avx-accent/20 rounded-2xl rounded-br-md px-4 py-2.5"><p class="text-sm text-avx-text leading-relaxed">${esc(msg.content)}</p><p class="text-[10px] text-avx-muted/50 text-right mt-1">${fmtT(msg.created_at)}</p></div>`;
    } else {
        d.innerHTML = `<div class="max-w-[80%] flex items-start gap-2.5"><div class="w-7 h-7 rounded-lg bg-avx-accent/10 flex items-center justify-center shrink-0 mt-0.5"><i class="fa-solid fa-print text-avx-accent text-[10px]"></i></div><div class="bg-avx-card border border-avx-border rounded-2xl rounded-bl-md px-4 py-2.5"><p class="text-sm text-avx-text leading-relaxed">${msg.content}</p><p class="text-[10px] text-avx-muted/50 mt-1">${fmtT(msg.created_at)}</p></div></div>`;
    }
    msgEl.appendChild(d);
    msgEl.scrollTop = msgEl.scrollHeight;
}

function closeConvModal() {
    cleanupConvChannel();
    document.getElementById('conv-modal').classList.add('hidden');
}

// ==============================================
// 16. EVENT LISTENERS
// ==============================================
document.getElementById('conv-modal').addEventListener('click', function(e) { if(e.target===this) closeConvModal(); });
document.getElementById('incident-modal').addEventListener('click', function(e) { if(e.target===this) closeIncidentModal(); });
document.getElementById('confirm-modal').addEventListener('click', function(e) { if(e.target===this) this.classList.add('hidden'); });
document.addEventListener('keydown', function(e) {
    if (e.key==='Escape') { closeConvModal(); closeIncidentModal(); document.getElementById('confirm-modal').classList.add('hidden'); }
});

// ==============================================
// 17. INIT — Check existing session
// ==============================================
(async function init() {
    if (!db) { showToast('Supabase not loaded. Check your connection.','error'); return; }
    try {
        const { data: { session } } = await db.auth.getSession();
        if (session && session.user) {
            S.authUser = session.user;
            await loadProfile(session.user);
        }
    } catch(e) {
        console.error('Init error:', e);
    }
    document.getElementById('li-email').focus();
})();
</script>
